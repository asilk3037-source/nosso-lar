<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nosso Lar ❤️ — Datas Importantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f472b6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Nosso Lar" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <script>if(localStorage.getItem('lar_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
<div class="container">

  <header class="hero" style="background:linear-gradient(135deg,#d97706 0%,#f59e0b 50%,#fbbf24 100%)">
    <div class="hero-emoji">📅</div>
    <h1>Datas Importantes</h1>
    <p class="hero-sub">Aline <span class="heart">❤️</span> Isabel</p>
    <p class="hero-desc">Aniversários, compromissos e comemorações!</p>
    <div class="user-badge" onclick="window.location.href='perfil.html'">
      <div class="user-avatar" id="nav-avatar"><span id="nav-initial"></span></div>
      <span id="nav-username">…</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <span class="stat-num pink" id="d-total">0</span>
      <span class="stat-label">Total de datas</span>
    </div>
    <div class="stat-card">
      <span class="stat-num orange" id="d-proximas">0</span>
      <span class="stat-label">Próximos 30 dias</span>
    </div>
    <div class="stat-card" style="grid-column:span 2">
      <span class="stat-num green" id="d-proxima-label" style="font-size:1rem">—</span>
      <span class="stat-label">Próximo evento</span>
    </div>
  </div>

  <section class="add-task-section">
    <h2 class="section-title" style="margin-bottom:14px">📌 Adicionar Data</h2>
    <div class="add-task-form">
      <input type="text" id="d-titulo"   class="task-input" placeholder="Nome do evento…" maxlength="60" style="flex:1 1 200px" />
      <input type="date" id="d-data"     class="task-input" style="flex:0 1 160px" />
      <select id="d-cat" class="task-select">
        <option value="🎂 Aniversário">🎂 Aniversário</option>
        <option value="💑 Relacionamento">💑 Relacionamento</option>
        <option value="🏥 Saúde">🏥 Saúde</option>
        <option value="💼 Trabalho">💼 Trabalho</option>
        <option value="🎉 Festa">🎉 Festa</option>
        <option value="✈️ Viagem">✈️ Viagem</option>
        <option value="📋 Outro">📋 Outro</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:var(--muted);white-space:nowrap;cursor:pointer">
        <input type="checkbox" id="d-repeat" style="accent-color:var(--pink);width:16px;height:16px" />
        Anual
      </label>
      <button class="btn-add" onclick="addDate()">Adicionar</button>
    </div>
  </section>

  <div class="filter-section">
    <div class="filters">
      <button class="filter-btn active" onclick="setDateFilter('all',   this)" data-df="all">Todas</button>
      <button class="filter-btn"        onclick="setDateFilter('soon',  this)" data-df="soon">Próximos 30 dias</button>
      <button class="filter-btn"        onclick="setDateFilter('past',  this)" data-df="past">Passadas</button>
      <button class="filter-btn"        onclick="setDateFilter('anual', this)" data-df="anual">Anuais</button>
    </div>
  </div>

  <section class="tasks-section">
    <h2 class="section-title" style="margin-bottom:14px">🗓️ Agenda</h2>
    <div id="dates-list" class="task-list">
      <div class="empty-state" id="dates-empty">
        <span>📅</span>
        <p>Nenhuma data ainda!<br>Adicione a primeira acima.</p>
      </div>
    </div>
  </section>

  <div style="height:90px"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html"   class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Início</span></a>
  <a href="tarefas.html" class="nav-item"><span class="nav-icon">✅</span><span class="nav-label">Tarefas</span></a>
  <a href="compras.html" class="nav-item"><span class="nav-icon">🛒</span><span class="nav-label">Compras</span></a>
  <a href="gastos.html"  class="nav-item"><span class="nav-icon">💰</span><span class="nav-label">Gastos</span></a>
  <a href="perfil.html"  class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Perfil</span></a>
</nav>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
(function setupAvatar() {
  const u = window.CURRENT_USER || '';
  document.getElementById('nav-username').textContent = u;
  document.getElementById('nav-initial').textContent  = u ? u[0] : '?';
  const el = document.getElementById('nav-avatar');
  const img = new Image();
  img.onload = () => { el.style.backgroundImage = `url('${img.src}')`; document.getElementById('nav-initial').style.display = 'none'; };
  img.src = `fotos/${u.toLowerCase()}.jpg`;
})();
</script>
<script src="datas.js?v=2"></script>
<script src="dialog.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
