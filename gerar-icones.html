<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerar ícones PWA — Nosso Lar</title>
  <style>
    body { font-family: sans-serif; padding: 32px; background: #fff8fd; color: #2d1458; }
    h1 { margin-bottom: 8px; }
    p  { margin-bottom: 24px; color: #a87bc0; }
    canvas { display: none; }
    .btns { display: flex; gap: 16px; flex-wrap: wrap; }
    button {
      padding: 14px 28px;
      background: linear-gradient(135deg,#c084fc,#e879a8);
      color: white; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 800; cursor: pointer;
    }
    .preview { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 24px; }
    .preview img { border-radius: 18px; box-shadow: 0 4px 20px rgba(168,85,247,.2); }
    .note { margin-top: 20px; font-size: .85rem; background: #f5eeff; padding: 12px 16px; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>🏠 Gerar ícones PWA</h1>
  <p>Clique nos botões para baixar os ícones PNG e salve-os na pasta <strong>icons/</strong> do projeto.</p>
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>
  <div class="btns">
    <button onclick="gerar(192)">⬇️ Baixar icon-192.png</button>
    <button onclick="gerar(512)">⬇️ Baixar icon-512.png</button>
  </div>
  <div class="preview" id="preview"></div>
  <div class="note">
    💡 Após baixar, mova os arquivos para a pasta <code>icons/</code> do projeto Nosso Lar e recarregue o site.
    Depois adicione ao celular via menu do navegador → "Adicionar à tela inicial".
  </div>
  <script>
    function gerar(size) {
      const id = 'c' + size;
      const canvas = document.getElementById(id);
      const ctx    = canvas.getContext('2d');
      const r      = size * 0.234; // border-radius ~23%

      // Fundo gradiente
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0,    '#c084fc');
      grad.addColorStop(0.55, '#e879a8');
      grad.addColorStop(1,    '#fb7185');

      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();

      // Emoji casa
      ctx.font = `${size * 0.54}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🏠', size / 2, size / 2 + size * 0.04);

      // Download
      const a   = document.createElement('a');
      a.href     = canvas.toDataURL('image/png');
      a.download = `icon-${size}.png`;
      a.click();

      // Preview
      const img = document.createElement('img');
      img.src   = canvas.toDataURL('image/png');
      img.width  = Math.min(size, 128);
      img.height = Math.min(size, 128);
      img.title  = `icon-${size}.png`;
      document.getElementById('preview').appendChild(img);
    }
  </script>
</body>
</html>
