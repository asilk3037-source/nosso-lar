<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nosso Lar ❤️ — Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
<div class="container">

  <header class="hero">
    <div class="hero-emoji">✅</div>
    <h1>Tarefas</h1>
    <p class="hero-sub">Aline <span class="heart">❤️</span> Isabel</p>
    <p class="hero-desc">Organização é o segredo de um lar feliz!</p>
    <div class="user-badge" onclick="window.location.href='perfil.html'">
      <div class="user-avatar" id="nav-avatar"><span id="nav-initial"></span></div>
      <span id="nav-username">…</span>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat-card" data-filter="all" onclick="setFilter('all')">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">Total de Tarefas</span>
    </div>
    <div class="stat-card" data-filter="pending" onclick="setFilter('pending')">
      <span class="stat-num orange" id="stat-pending">0</span>
      <span class="stat-label">Pendentes</span>
    </div>
    <div class="stat-card" data-filter="done" onclick="setFilter('done')">
      <span class="stat-num green" id="stat-done">0</span>
      <span class="stat-label">Concluídas</span>
    </div>
    <div class="stat-card">
      <span class="stat-num pink" id="stat-progress">0%</span>
      <span class="stat-label">Progresso</span>
    </div>
  </div>

  <div class="card" style="padding:14px 22px">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <section class="add-task-section">
    <h2 class="section-title" style="margin-bottom:14px">✏️ Nova Tarefa</h2>
    <div class="add-task-form">
      <input type="text" id="task-input" class="task-input" placeholder="Nome da tarefa…" maxlength="80" />
      <select id="task-responsible" class="task-select">
        <option value="Aline">👤 Aline</option>
        <option value="Isabel">👤 Isabel</option>
        <option value="Aline + Isabel">👥 Aline + Isabel</option>
      </select>
      <select id="task-category" class="task-select">
        <option value="🏠 Casa">🏠 Casa</option>
        <option value="🛒 Compras">🛒 Compras</option>
        <option value="💊 Saúde">💊 Saúde</option>
        <option value="🐾 Pet">🐾 Pet</option>
        <option value="💼 Trabalho">💼 Trabalho</option>
        <option value="📚 Estudos">📚 Estudos</option>
        <option value="🎉 Lazer">🎉 Lazer</option>
        <option value="📋 Outro">📋 Outro</option>
      </select>
      <button class="btn-add" onclick="addTask()">Adicionar</button>
    </div>
  </section>

  <div class="filter-section">
    <div class="filters">
      <button class="filter-btn active" data-filter="all"     onclick="setFilter('all',    this)">Todas</button>
      <button class="filter-btn"        data-filter="pending" onclick="setFilter('pending', this)">Pendentes</button>
      <button class="filter-btn"        data-filter="done"    onclick="setFilter('done',    this)">Concluídas</button>
      <button class="filter-btn"        data-filter="Aline"   onclick="setFilter('Aline',   this)">👤 Aline</button>
      <button class="filter-btn"        data-filter="Isabel"  onclick="setFilter('Isabel',  this)">👤 Isabel</button>
    </div>
  </div>

  <section class="tasks-section">
    <div class="section-header">
      <h2 class="section-title">📋 Lista de Tarefas</h2>
    </div>
    <div id="task-list" class="task-list">
      <div class="empty-state" id="empty-state">
        <span>✨</span>
        <p>Nenhuma tarefa aqui!<br>Adicione a primeira acima.</p>
      </div>
    </div>
  </section>

  <div style="height:90px"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html"   class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Início</span></a>
  <a href="tarefas.html" class="nav-item active"><span class="nav-icon">✅</span><span class="nav-label">Tarefas</span></a>
  <a href="compras.html" class="nav-item"><span class="nav-icon">🛒</span><span class="nav-label">Compras</span></a>
  <a href="gastos.html"  class="nav-item"><span class="nav-icon">💰</span><span class="nav-label">Gastos</span></a>
  <a href="perfil.html"  class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Perfil</span></a>
</nav>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
(function setupAvatar() {
  const u = window.CURRENT_USER || '';
  document.getElementById('nav-username').textContent = u;
  document.getElementById('nav-initial').textContent  = u ? u[0] : '?';
  const el = document.getElementById('nav-avatar');
  const img = new Image();
  img.onload = () => { el.style.backgroundImage = `url('${img.src}')`; document.getElementById('nav-initial').style.display = 'none'; };
  img.src = `fotos/${u.toLowerCase()}.jpg`;
})();
</script>
<script src="app.js?v=11"></script>
</body>
</html>
