<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nosso Lar ❤️ — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=10" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Hero */
    .login-hero {
      background: var(--gradient);
      border-radius: 28px;
      padding: 48px 32px 40px;
      text-align: center;
      color: white;
      box-shadow: 0 12px 48px rgba(192,132,252,.35);
      position: relative;
      overflow: hidden;
    }
    .login-hero::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(255,255,255,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-hero-emoji { font-size: 3.4rem; margin-bottom: 10px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,.2)); }
    .login-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -.5px;
      margin-bottom: 5px;
    }
    .login-hero p { font-size: .95rem; opacity: .9; font-weight: 600; }

    /* Card */
    .login-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow-md);
      border: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--text);
      text-align: center;
    }
    .login-subtitle {
      font-size: .83rem;
      color: var(--muted);
      text-align: center;
      margin-top: -10px;
      font-weight: 600;
    }

    /* Profile picker */
    .login-label {
      font-size: .78rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .login-profile-row { display: flex; gap: 12px; }
    .btn-profile-pick {
      flex: 1;
      padding: 18px 10px 14px;
      border: 2.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all .18s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-profile-pick:hover { border-color: var(--pink); background: var(--pink-light); }
    .btn-profile-pick.selected {
      border-color: var(--pink);
      background: var(--pink-light);
      box-shadow: 0 0 0 3px rgba(244,114,182,.18);
    }

    /* Avatar circular na tela de login */
    .pick-photo-wrap {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--border);
      background: var(--purple-light) center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--purple-dark);
      position: relative;
      flex-shrink: 0;
      transition: border-color .18s;
    }
    .btn-profile-pick.selected .pick-photo-wrap { border-color: var(--pink); }
    .pick-photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pick-name {
      font-size: .88rem;
      font-weight: 800;
      color: var(--text);
    }

    /* Campos */
    .login-field { display: flex; flex-direction: column; gap: 7px; }
    .login-input {
      padding: 13px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .login-input:focus {
      border-color: var(--pink);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(244,114,182,.12);
    }

    /* Botão entrar */
    .btn-login {
      padding: 15px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 18px rgba(192,132,252,.4);
    }
    .btn-login:hover { opacity: .92; transform: translateY(-1px); }
    .btn-login:active { transform: scale(.98); }

    /* Erro */
    .login-error {
      background: #fde8ec;
      border: 1.5px solid #fbb6c8;
      color: #be123c;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: .88rem;
      font-weight: 700;
      display: none;
    }

    /* Spinner */
    .loading-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-hero">
      <div class="login-hero-emoji">🏠</div>
      <h1>Nosso Lar</h1>
      <p>Aline <span class="heart">❤️</span> Isabel</p>
    </div>

    <div class="login-card">
      <h2 class="login-title">Bem-vinda de volta!</h2>
      <p class="login-subtitle">Escolha quem é você e entre com sua senha</p>

      <div>
        <div class="login-label" style="margin-bottom:10px">Quem está entrando?</div>
        <div class="login-profile-row">
          <button class="btn-profile-pick selected" id="pick-aline" onclick="selectProfile('Aline')">
            <div class="pick-photo-wrap" id="avatar-aline">A
              <img src="fotos/aline.jpg" alt="Aline" onerror="this.remove()" />
            </div>
            <span class="pick-name">Aline</span>
          </button>
          <button class="btn-profile-pick" id="pick-isabel" onclick="selectProfile('Isabel')">
            <div class="pick-photo-wrap" id="avatar-isabel">I
              <img src="fotos/isabel.jpg" alt="Isabel" onerror="this.remove()" />
            </div>
            <span class="pick-name">Isabel</span>
          </button>
        </div>
      </div>

      <div class="login-field">
        <label class="login-label" for="login-password">Senha</label>
        <input type="password" id="login-password" class="login-input"
          placeholder="Digite sua senha…"
          onkeydown="if(event.key==='Enter') doLogin()" />
      </div>

      <div class="login-error" id="login-error">❌ Senha incorreta. Tente novamente.</div>

      <button class="btn-login" onclick="doLogin()">
        <span id="btn-login-text">Entrar ✨</span>
        <div class="loading-spinner" id="login-spinner"></div>
      </button>
    </div>

  </div>

  <script>
    const PASSWORDS = { Aline: 'aline123', Isabel: 'isabel123' };
    let selectedProfile = 'Aline';

    function selectProfile(name) {
      selectedProfile = name;
      document.getElementById('pick-aline').classList.toggle('selected', name === 'Aline');
      document.getElementById('pick-isabel').classList.toggle('selected', name === 'Isabel');
      document.getElementById('login-password').value = '';
      document.getElementById('login-password').focus();
      document.getElementById('login-error').style.display = 'none';
    }

    function doLogin() {
      const pwd = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      const txt = document.getElementById('btn-login-text');
      const spn = document.getElementById('login-spinner');

      const storedPwd = sessionStorage.getItem(`lar_pwd_${selectedProfile}`) || PASSWORDS[selectedProfile];
      if (pwd !== storedPwd) {
        err.style.display = 'block';
        document.getElementById('login-password').focus();
        return;
      }
      err.style.display = 'none';
      txt.style.display = 'none';
      spn.style.display = 'block';
      sessionStorage.setItem('lar_user', selectedProfile);
      setTimeout(() => { window.location.href = 'index.html'; }, 600);
    }

    if (sessionStorage.getItem('lar_user')) window.location.href = 'index.html';
  </script>
</body>
</html>
