<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nosso Lar ❤️ — Contas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
<div class="container">

  <header class="hero hero-green">
    <div class="hero-emoji">💰</div>
    <h1>Contas</h1>
    <p class="hero-sub">Aline <span class="heart">❤️</span> Isabel</p>
    <p class="hero-desc">Controle de gastos e contas a pagar.</p>
    <div class="user-badge" onclick="window.location.href='perfil.html'">
      <div class="user-avatar" id="nav-avatar"><span id="nav-initial"></span></div>
      <span id="nav-username">…</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card stat-active" data-person="Aline" onclick="switchPerson('Aline')">
      <span class="stat-num green" id="total-aline">R$ 0</span>
      <span class="stat-label">Total Aline</span>
    </div>
    <div class="stat-card" data-person="Isabel" onclick="switchPerson('Isabel')">
      <span class="stat-num pink" id="total-isabel">R$ 0</span>
      <span class="stat-label">Total Isabel</span>
    </div>
    <div class="stat-card">
      <span class="stat-num orange" id="total-unpaid">0</span>
      <span class="stat-label">A pagar</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="total-geral">R$ 0</span>
      <span class="stat-label">Total Geral</span>
    </div>
  </div>

  <div class="person-tabs" id="person-tabs">
    <button class="person-tab active" id="tab-aline" onclick="switchPerson('Aline', this)">
      <div class="tab-avatar" id="tab-avatar-aline">A<img src="fotos/aline.jpg" alt="Aline" onerror="this.remove()" /></div>
      Aline
    </button>
    <button class="person-tab" id="tab-isabel" onclick="switchPerson('Isabel', this)">
      <div class="tab-avatar" id="tab-avatar-isabel">I<img src="fotos/isabel.jpg" alt="Isabel" onerror="this.remove()" /></div>
      Isabel
    </button>
  </div>

  <!-- Tabs A Pagar / Pago -->
  <div class="bill-tabs">
    <button class="bill-tab active" id="bill-tab-unpaid" onclick="switchBillTab('unpaid', this)">⏳ A Pagar</button>
    <button class="bill-tab"       id="bill-tab-paid"   onclick="switchBillTab('paid',   this)">✅ Pagas</button>
    <button class="bill-tab"       id="bill-tab-all"    onclick="switchBillTab('all',    this)">📋 Todas</button>
  </div>

  <section class="add-task-section">
    <h2 class="section-title" id="form-title" style="margin-bottom:14px">➕ Novo Lançamento — Aline</h2>
    <div class="add-task-form">
      <input type="text"   id="expense-desc"  class="task-input" placeholder="Descrição…" maxlength="80" />
      <select id="expense-cat" class="task-select">
        <option value="🛒 Mercado">🛒 Mercado</option>
        <option value="🍔 Alimentação">🍔 Alimentação</option>
        <option value="💊 Saúde">💊 Saúde</option>
        <option value="🚌 Transporte">🚌 Transporte</option>
        <option value="🏠 Casa">🏠 Casa</option>
        <option value="💡 Conta Fixa">💡 Conta Fixa</option>
        <option value="👗 Roupas">👗 Roupas</option>
        <option value="🐾 Pet">🐾 Pet</option>
        <option value="🎉 Lazer">🎉 Lazer</option>
        <option value="📋 Outro">📋 Outro</option>
      </select>
      <input type="number" id="expense-value" class="task-input" placeholder="R$ Valor"
        min="0" step="0.01" style="max-width:120px;flex:0 1 120px" />
      <input type="date"   id="expense-due"   class="task-input" style="max-width:150px;flex:0 1 150px" title="Vencimento (opcional)" />
      <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:var(--muted);white-space:nowrap;cursor:pointer">
        <input type="checkbox" id="expense-recurring" style="accent-color:var(--pink);width:16px;height:16px" />
        Recorrente
      </label>
      <button class="btn-add" onclick="addExpense()">Adicionar</button>
    </div>
  </section>

  <section class="tasks-section">
    <h2 class="section-title" id="history-title" style="margin-bottom:14px">📋 Histórico — Aline</h2>
    <div id="expense-list" class="task-list">
      <div class="empty-state" id="expense-empty">
        <span>💸</span>
        <p>Nenhum lançamento aqui!<br>Adicione o primeiro acima.</p>
      </div>
    </div>
  </section>

  <div style="height:90px"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html"   class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Início</span></a>
  <a href="tarefas.html" class="nav-item"><span class="nav-icon">✅</span><span class="nav-label">Tarefas</span></a>
  <a href="compras.html" class="nav-item"><span class="nav-icon">🛒</span><span class="nav-label">Compras</span></a>
  <a href="gastos.html"  class="nav-item active"><span class="nav-icon">💰</span><span class="nav-label">Gastos</span></a>
  <a href="perfil.html"  class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Perfil</span></a>
</nav>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
(function setupAvatar() {
  const u = window.CURRENT_USER || '';
  document.getElementById('nav-username').textContent = u;
  document.getElementById('nav-initial').textContent  = u ? u[0] : '?';
  const el = document.getElementById('nav-avatar');
  const img = new Image();
  img.onload = () => { el.style.backgroundImage = `url('${img.src}')`; document.getElementById('nav-initial').style.display = 'none'; };
  img.src = `fotos/${u.toLowerCase()}.jpg`;
})();
// default due date to today
document.getElementById('expense-due').value = new Date().toISOString().split('T')[0];
</script>
<script src="gastos.js?v=11"></script>
</body>
</html>
